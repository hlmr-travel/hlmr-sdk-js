name: Publish SDK to NPM

on:
  push:
    tags:
      - 'v*'  # Déclenché sur les tags de version (ex: v1.0.2)
  workflow_dispatch:  # Permet de déclencher manuellement

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Nécessaire pour créer des releases
      id-token: write  # Nécessaire pour NPM provenance
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test
        
      - name: Build package
        run: npm run build
        
      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Version extraite: $VERSION"
          else
            echo "Pas un tag de version, utilisation de la version du package.json"
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi
          
      - name: Publish to NPM
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 🚀 SDK Public v${{ steps.version.outputs.version }}
            
            ### 📦 Installation
            ```bash
            npm install @hlmr/sdk-js@${{ steps.version.outputs.version }}
            ```
            
            ### 📋 Changements
            - Voir le CHANGELOG.md pour les détails
            
            ### 🔗 Liens
            - [NPM Package](https://www.npmjs.com/package/@hlmr/sdk-js)
            - [Documentation](https://github.com/hlmr-travel/hlmr-sdk-js#readme)
          draft: false
          prerelease: false

  # Job séparé pour notifier en cas d'échec
  notify-failure:
    runs-on: ubuntu-latest
    needs: publish
    if: failure()
    
    steps:
      - name: Notify failure
        run: |
          echo "❌ Publication échouée pour ${{ github.ref }}"
          echo "Vérifiez les logs ci-dessus pour plus de détails"
